<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woolmarts</title>

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <div class="logo">Woolmarts</div>

    <nav>
        <a href="index.html">Home</a>
        <a href="clothing.html">Clothing</a>
        <a href="groceries.html">Food & Groceries</a>
        <a href="essentials.html">Essentials</a>
        <a href="promotions.html">Promotions</a>
        <a href="members.html">Members</a>
        <a href="feedback.html">Feedback</a>
        <a href="login.html">Login</a>
    </nav>

    <input type="text" id="searchBar" placeholder="Search products..." />

    <div class="cart">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<!-- HERO SLIDER -->
<section class="hero">
    <div class="slide active">
        <img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
        <div class="overlay">
            <h1>Fresh Groceries Delivered</h1>
            <button>Shop Now</button>
        </div>
    </div>

    <div class="slide">
        <img src="https://images.unsplash.com/photo-1521335629791-ce4aec67dd47">
        <div class="overlay">
            <h1>New Fashion Arrivals</h1>
            <button>Explore</button>
        </div>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">

    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
            <h3>Fresh Apples</h3>
            <p>P20</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
            <h3>Casual Outfit</h3>
            <p>P150</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
            <h3>Cleaning Kit</h3>
            <p>P80</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product" data-name="shoes">
  <h3>Shoes</h3>
</div>

<div class="product" data-name="bag">
  <h3>Bag</h3>
</div>

    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Woolmarts | All Rights Reserved</p>
</footer>

</body>
</html>
