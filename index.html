<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Woolmarts</title>

<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>

<body>

<!-- HEADER -->
<header>
    <nav class="navbar">

        <!-- LEFT SIDE -->
        <div class="nav-left">
            <h1 class="logo">Woolmarts</h1>

            <div class="nav-links">
                <a href="#" class="active">Home</a>
                <a href="#">Clothing</a>
                <a href="#">Groceries</a>
                <a href="#">Household</a>
                <a href="#">Promotions</a>
                <a href="#">Feedback</a>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="nav-right">

            <!-- SEARCH -->
            <div class="search-container">
                <input type="text" placeholder="Search products" id="searchInput">
                <button onclick="searchProduct()">
                    🔍
                </button>
            </div>

            <!-- ICONS -->
            <div class="icons">
                <div class="icon user">👤</div>

                <div class="icon cart">
                    🛒
                    <span id="cart-count">0</span>
                </div>
            </div>

        </div>

    </nav>
</header>

<!-- HERO SLIDER -->
<section class="hero">
    <div class="slide active">
        <img src="images/new-arrivals.jpg">
        <div class="overlay">
            <h1>Fresh Groceries Delivered</h1>
            <button>Shop Now</button>
        </div>
    </div>

    <div class="slide">
        <img src="images/new-arrivals.jpg">
        <div class="overlay">
            <h1>New Fashion Arrivals</h1>
            <button>Explore</button>
        </div>
    </div>
</section>

<!-- PRODUCTS -->
<section class="products">

    <h2>Featured Products</h2>

    <div class="product-grid">

        <div class="product">
            <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
            <h3>Fresh Apples</h3>
            <p>P20</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
            <h3>Casual Outfit</h3>
            <p>P150</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
            <h3>Cleaning Kit</h3>
            <p>P80</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="product" data-name="shoes">
  <h3>Shoes</h3>
</div>

<div class="product" data-name="bag">
  <h3>Bag</h3>
</div>

    </div>

</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Woolmarts | All Rights Reserved</p>
</footer>

</body>
</html>
